version: 2

builds:
  - binary: asana-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/danilodrobac/asana-cli/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "asana-cli_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: danilodrobac
    name: asana-cli
  extra_files:
    - glob: skill/SKILL.md
